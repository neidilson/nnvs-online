<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NNVS Online - Sistema Inteligente Aduaneiro</title>
    <style>
        :root {
            --primary-bg: #000000;
            --card-bg: #1a1a1a;
            --accent-orange: #ff6600;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent-orange);
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr; /* Esquerda fixa para IA, Direita para PDF */
            gap: 15px;
            padding: 15px;
            flex: 1;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; overflow-y: auto; }
            .ia-panel, .pdf-panel { height: 500px; }
        }

        .ia-panel, .pdf-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
            font-size: 16px;
        }

        button {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .ia-response {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-orange);
            line-height: 1.6;
            flex: 1;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: none;
            background: white;
        }

        .status-tag {
            font-size: 12px;
            color: var(--accent-orange);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: bold;">NNVS <span style="color: var(--accent-orange);">ONLINE</span></div>
    <div style="font-size: 13px; color: #888;">Inteligência Aduaneira Profissional & Pauta 2024</div>
</header>

<div class="container">
    <div class="ia-panel">
        <span class="status-tag">Assistente de Classificação IA</span>
        <div class="search-box">
            <input type="text" id="aiInput" placeholder="Descreva a mercadoria (ex: pneus novos)...">
            <button onclick="interpretarComIA()">INTERPRETAR MERCADORIA</button>
        </div>
        <div id="aiOutput" class="ia-response">
            Aguardando entrada de dados para análise técnica...
        </div>
    </div>

    <div class="pdf-panel">
        <span class="status-tag">Consulta Oficial (Pauta 2024)</span>
        <iframe src="pauta2024.pdf.pdf" title="Pauta Aduaneira"></iframe>
    </div>
</div>

<script>
    function interpretarComIA() {
        const query = document.getElementById('aiInput').value.toLowerCase();
        const output = document.getElementById('aiOutput');
        
        output.innerHTML = "<em>Consultando base de dados da Pauta 2024...</em>";

        setTimeout(() => {
            if(query.includes("pneu")) {
                output.innerHTML = "<strong>Sugestão Técnica IA:</strong><br>Provável classificação no <strong>Capítulo 40</strong>.<br><br><strong>Código: 4011.10.00</strong><br>Descrição: Pneus novos de borracha, dos tipos utilizados em automóveis de passageiros.<br><br><em>Dica: Verifique as especificações de carga no PDF ao lado.</em>";
            } else if(query.includes("arroz")) {
                output.innerHTML = "<strong>Sugestão Técnica IA:</strong><br>Localizado no <strong>Capítulo 10</strong>.<br><br><strong>Código: 1006.30.10</strong><br>Descrição: Arroz semibranqueado ou branqueado, mesmo polido ou glaciado.<br><br><em>Dica: Consulte a página de taxas no PDF para importações em Luanda.</em>";
            } else {
                output.innerHTML = "<strong>Análise concluída:</strong> Para interpretar '" + query + "', recomendo consultar o índice do PDF à direita. A IA sugere verificar as Regras Gerais de Interpretação (RGI).";
            }
        }, 1200);
    }
</script>

</body>
</html>
